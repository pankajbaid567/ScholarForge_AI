version: '3.8'

services:
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://scholarforge:scholarforge@postgres:5432/scholarforge
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_DB_DIR=/app/chroma_data
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: celery -A src.workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://scholarforge:scholarforge@postgres:5432/scholarforge
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_DB_DIR=/app/chroma_data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scholarforge
      POSTGRES_PASSWORD: scholarforge
      POSTGRES_DB: scholarforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:0.5.0
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: scholarforge_phoenix
    ports:
      - "6006:6006" # UI and OTLP Receiver port
    environment:
      - PHOENIX_HOST=0.0.0.0

volumes:
  postgres_data:
  redis_data:
  chroma_data:
