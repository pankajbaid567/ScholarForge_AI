services:
  # ---------------------------------------------------------
  # 1. Managed Redis
  # ---------------------------------------------------------
  - type: redis
    name: scholarforge-redis
    plan: free
    ipAllowList: [] # internal only

  # ---------------------------------------------------------
  # 2. FastAPI Web Service
  # ---------------------------------------------------------
  - type: web
    name: scholarforge-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: "uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # Requires manual entry in the Render Dashboard (Neon DB URL)
      - key: REDIS_URL
        fromService:
          type: redis
          name: scholarforge-redis
          property: connectionString
      - key: CHROMA_TENANT
        value: "89d53025-10e6-4f9a-8ad9-a8726bae971d"
      - key: CHROMA_DATABASE
        value: "scholarforge-ai"
      - key: CHROMA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false

  # ---------------------------------------------------------
  # 3. Celery Background Worker (Deployed as a Free Web Service)
  # ---------------------------------------------------------
  - type: web
    name: scholarforge-worker
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    # Hack to run a background worker on Render's free tier:
    # Run Celery in the background, and a dummy HTTP server in the foreground
    # Starts worker listening to both queues in background with dummy HTTP server
    dockerCommand: "./start_worker.sh"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: scholarforge-redis
          property: connectionString
      - key: CHROMA_TENANT
        value: "89d53025-10e6-4f9a-8ad9-a8726bae971d"
      - key: CHROMA_DATABASE
        value: "scholarforge-ai"
      - key: CHROMA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
