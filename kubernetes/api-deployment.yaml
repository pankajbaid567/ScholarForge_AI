apiVersion: apps/v1
kind: Deployment
metadata:
  name: scholarforge-api
  labels:
    app: scholarforge-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scholarforge-api
  template:
    metadata:
      labels:
        app: scholarforge-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: api
        image: scholarforge/api:latest
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: scholarforge-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: scholarforge-api-svc
spec:
  selector:
    app: scholarforge-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scholarforge-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scholarforge-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
